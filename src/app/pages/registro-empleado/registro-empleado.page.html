<ion-content class="ion-padding ion-text-center dark-reg">
  <div class="reg-wrapper">
    <h1 class="brand-title">ISP PERU</h1>
    <h3 class="reg-subtitle">Registro de Usuario</h3>

    <div class="form-container">
      <ion-item class="custom-input" lines="none">
        <ion-input 
          label="Nombre completo" 
          labelPlacement="stacked" 
          placeholder="Ej. Juan Pérez" 
          [(ngModel)]="nombre">
        </ion-input>
      </ion-item>

      <ion-item class="custom-input ion-margin-top" lines="none">
        <ion-select 
          label="Rol" 
          labelPlacement="stacked" 
          placeholder="Seleccione rol" 
          [(ngModel)]="rol">
          <ion-select-option value="trabajador">Trabajador</ion-select-option>
          <ion-select-option value="supervisor">Supervisor</ion-select-option>
        </ion-select>
      </ion-item>

      <ion-item class="custom-input ion-margin-top" lines="none">
        <ion-input 
          label="Correo" 
          labelPlacement="stacked" 
          type="email" 
          placeholder="correo@ejemplo.com" 
          [(ngModel)]="correo">
        </ion-input>
      </ion-item>

      <ion-item class="custom-input ion-margin-top" lines="none">
        <ion-input 
          label="Contraseña" 
          labelPlacement="stacked" 
          type="password" 
          placeholder="********" 
          [(ngModel)]="password">
        </ion-input>
      </ion-item>
    </div>

    <ion-button expand="block" shape="round" class="btn-reg ion-margin-top" (click)="registrarUsuario()">
      REGISTRARSE
    </ion-button>

    <p class="white-text ion-margin-top" routerLink="/login" style="cursor: pointer;">
      ¿Ya tienes cuenta? <ion-text color="primary"><b>Iniciar sesión</b></ion-text>
    </p>
  </div>
</ion-content>
